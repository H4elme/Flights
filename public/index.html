<h1>Flight Manager</h1>

<style>
    input{
        width: 150px;
    }
    .overlay{
        position: fixed;
        top: 0;
        bottom: 0;
        right: 0;
        left: 0;
        background-color: rgba(0,0,0,0.1);
        z-index: 0;
    }
    .addForm {
        background-color: white;
        border: 1px outset black;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        position: fixed;
        padding: 40px;
        z-index: 11;
    }
    .formRow {
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
        gap: 20px;
    }
    .hidden {
        display: none;
    }
</style>

<!-- <div id = "status-message"></div> -->
<div class = "overlay hidden" id = "overlay"></div>
<div class = "addForm hidden" id = "add_form">
    <button style = "position: absolute; top: 10px; right: 10px;" id = "close_btn">X</button>
    <div class = "formRow"><label>Departs from: </label><input id = "depart_from_input"></div>
    <div class = "formRow"><label>Arrives at: </label><input id = "destination_input"> </div>
    <div class = "formRow"><label>Departure time: </label><input type = "datetime-local" id = "departure_time_input"> </div>
    <div class = "formRow"><label>Arrival time: </label><input type = "datetime-local" id = "arrival_time_input"> </div>
    <div class = "formRow"><label>Plane ID: </label><input id = plane_id_input> </div>
    <div class = "formRow"><label>Crew member ID: </label><input type = "number" id = crew_id_input> </div>
    <div style = "display: flex; margin-top: 10px; margin-bottom: -25px;justify-content: center; align-items: center;"><button id = "add_btn">Add</button></div>
</div>

<table id = "flight-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>From</th>
            <th>To</th>
            <th>Departure</th>
            <th>Arrival</th>
            <th>Plane</th>
            <th>Crew</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id = "flight-data"></tbody>
</table>
<button id = "add_flight_btn">Add flight</button>

<script src = "script.js"></script>
