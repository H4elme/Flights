<h1>Flight Manager</h1>

<style>
    input{
        width: 170px;
    }
    select{
        width: 170px;
    }
    .overlay{
        position: fixed;
        top: 0;
        bottom: 0;
        right: 0;
        left: 0;
        background-color: rgba(0,0,0,0.1);
        z-index: 0;
    }
    .addForm {
        background-color: white;
        border: 1px outset black;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        position: fixed;
        padding: 40px;
        z-index: 11;
    }
    .formRow {
        display: flex;
        align-items: center; 
        justify-content: flex-start;
        gap: 10px; 
        margin-bottom: 8px;
    }

    .formRow label {
        width: 130px;
        flex-shrink: 0;
    }
    .hidden {
        display: none;
    }
    .crewSelect {

    }
    .error {
        color: red;
        font-size: 14px;
    }
</style>

<!-- <div id = "status-message"></div> -->
<div class = "overlay hidden" id = "overlay"></div>
<div class = "addForm hidden" id = "add_form">
    <button style = "position: absolute; top: 10px; right: 10px;" id = "close_btn">X</button>
    <div class = "formRow"><label>Departs from: </label><input id = "depart_from_input" placeholder = "Warsaw"></div>
    <div class = "error" id = "depart_from_error" ></div>

    <div class = "formRow"><label>Arrives at: </label><input id = "destination_input" placeholder = "Berlin"> </div>
    <div class = "error" id = "arrive_at_error" ></div>
    
    <div class = "formRow"><label>Departure time: </label><input type = "datetime-local" id = "departure_time_input" selected = "selected"> </div>
    <div class = "error" id = "departure_time_error" ></div>

    <div class = "formRow"><label>Arrival time: </label><input type = "datetime-local" id = "arrival_time_input"> </div>
    <div class = "error" id = "arrival_time_error" ></div>
    
    <div class = "formRow"><label>Plane ID: </label><select id = plane_select><option value = ""></option></select></div>
    <div id = "crew_selector_container"></div>

    <div class = "error" id = "crew_error"></div>
    <button id = "add_crew_btn">Add crew</button>
    <div style = "display: flex; margin-top: 10px; margin-bottom: -25px;justify-content: center; align-items: center;"><button id = "add_btn">Add</button></div>
</div>

<table id = "flight-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>From</th>
            <th>To</th>
            <th>Departure</th>
            <th>Arrival</th>
            <th>Plane</th>
            <th>Crew</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id = "flight-data"></tbody>
</table>
<button id = "add_flight_btn">Add flight</button>

<script src = "script.js"></script>
